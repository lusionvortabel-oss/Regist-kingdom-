<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerbang Naga Gelap</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(139, 0, 0, 0.15) 0%, transparent 80%),
                url('https://www.transparenttextures.com/patterns/dark-matter.png');
            color: #e0e0e0;
            font-family: 'MedievalSharp', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(15, 15, 15, 0.95);
            padding: 40px;
            border: 2px solid #4a0000;
            box-shadow: 0 0 30px #8b0000, inset 0 0 15px #000;
            border-radius: 5px;
            position: relative;
            text-align: center;
        }

        .container::before {
            content: '🐉';
            font-size: 50px;
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            text-shadow: 0 0 20px #ff0000;
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            color: #ff3333;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px #000;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #4a0000;
            color: #fff;
            box-sizing: border-box;
            font-family: 'MedievalSharp', cursive;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #ff0000;
            box-shadow: 0 0 10px #8b0000;
            background: #252525;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4a0000 0%, #8b0000 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Cinzel Decorative', cursive;
            font-weight: bold;
            font-size: 1.1em;
            text-transform: uppercase;
            margin-top: 20px;
            transition: 0.3s;
            clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
        }

        button:hover {
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
            transform: scale(1.02);
        }

        #welcomeScreen {
            display: none;
            animation: fadeIn 2s ease-in-out;
        }

        .welcome-msg {
            font-size: 1.5em;
            color: #ffd700;
            text-shadow: 0 0 10px #ffae00;
            line-height: 1.6;
        }

        .blood-text {
            color: #ff0000;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .decoration {
            position: fixed;
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="container" id="regForm">
        <h1>Registrasi Ksatria Gelap</h1>
        <div class="form-group">
            <label>Nama Bangsawan / Gelar</label>
            <input type="text" id="nama" placeholder="Contoh: Valerius Sang Penghancur" required>
        </div>
        <div class="form-group">
            <label>Wilayah Kekuasaan (Lokasi)</label>
            <input type="text" id="lokasi" placeholder="Contoh: Lembah Kematian" required>
        </div>
        <div class="form-group">
            <label>Siklus Kehidupan (Umur)</label>
            <input type="number" id="umur" placeholder="Umur Anda..." required>
        </div>
        <button onclick="submitForm()">Summon Kekuatan</button>
    </div>

    <div class="container" id="welcomeScreen">
        <h1>Sembah Sujud!</h1>
        <div class="welcome-msg" id="msgContent"></div>
        <div style="margin-top: 30px; font-style: italic; color: #666;">
            "Naga kegelapan kini mengakuimu sebagai sekutu."
        </div>
        <button onclick="location.reload()" style="margin-top: 20px; font-size: 0.8em; width: auto; padding: 10px 30px;">Kembali ke Kegelapan</button>
    </div>

    <script>
        function submitForm() {
            const nama = document.getElementById('nama').value;
            const lokasi = document.getElementById('lokasi').value;
            const umur = document.getElementById('umur').value;

            if (nama && lokasi && umur) {
                document.getElementById('regForm').style.display = 'none';
                document.getElementById('welcomeScreen').style.display = 'block';
                
                const msg = `Selamat datang, <span class="blood-text">${nama}</span> dari <span class="blood-text">${lokasi}</span>. <br><br> Di usiamu yang ke-${umur} siklus, namamu telah terukir di tulang naga kuno Kerajaan Gelap. Persiapkan dirimu untuk peperangan abadi!`;
                
                document.getElementById('msgContent').innerHTML = msg;
            } else {
                alert("Lengkapi semua mantera (data) sebelum memanggil naga!");
            }
        }
    </script>

</body>
</html>
